name: CI Pipeline

on: [push, pull_request]

jobs:
  integration-and-ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: ./webapp

      - name: Start app dependencies (Postgres)
        run: |
          docker run -d --name appdb -p 5432:5432 \
            -e POSTGRES_USER=appuser -e POSTGRES_PASSWORD=apppass -e POSTGRES_DB=appdb \
            postgres:17
          sleep 8
          docker cp webapp/db/init.sql appdb:/init.sql
          docker cp webapp/db/100k-most-used-passwords-NCSC.txt appdb:/100k-most-used-passwords-NCSC.txt
          docker exec appdb bash -c "sed -i 's#/docker-entrypoint-initdb.d/##' /init.sql"
          docker exec -e PGPASSWORD=apppass appdb psql -U appuser -d appdb -f /init.sql

      - name: Run integration tests
        run: npm test -- tests/integration.test.js
        working-directory: ./webapp
        env:
          DB_HOST: localhost

      - name: Start app (http only, for UI test)
        run: |
          node -e "
            const http = require('http');
            const app = require('./app');
            http.createServer(app).listen(8080, () => console.log('up'));
          " &
        working-directory: ./webapp
        env:
          DB_HOST: localhost

      - name: Wait for app
        run: npx wait-on http://localhost:8080/index.html
        working-directory: ./webapp

      - name: Run UI tests over http
        run: npm test -- tests/ui.test.js
        working-directory: ./webapp
        env:
          APP_URL: http://localhost:8080

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1.1.0
        with:
          project: "SSD-Exam-Webapp"
          path: "./webapp"
          format: "HTML"
          out: "dependency-check-report"

      - uses: actions/upload-artifact@v4
        with:
          name: Dependency-Check-Report
          path: dependency-check-report

  eslint-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install
          npm install eslint@^9 eslint-plugin-security @microsoft/eslint-formatter-sarif --save-dev
        working-directory: ./webapp

      - name: Run ESLint with security plugin
        run: |
          mkdir -p reports
          npx eslint . --format=@microsoft/eslint-formatter-sarif --output-file=reports/eslint-results.sarif
        working-directory: ./webapp
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: webapp/reports/eslint-results.sarif
